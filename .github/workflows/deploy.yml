name: Build and deploy to O2switch

on:
  push:
    branches: [main]
  workflow_dispatch:  # permet aussi un déclenchement manuel depuis l'onglet Actions

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Deploy to O2switch via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps                        # FTP over TLS (O2switch supporte)
          port: 21
          local-dir: ./dist/
          server-dir: ./livrets.corailconciergerie.com.mama4664.odns.fr/
          # Exclusions globales
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store
          # Le fichier de sync state stocké sur le serveur permet à l'action
          # de ne ré-uploader QUE les fichiers modifiés à chaque déploiement
          state-name: .ftp-deploy-sync-state.json
          dry-run: false
          log-level: standard
